<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Techy-X</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #ffffff;
      color: #000000;
    }

    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }

    header h1 {
      font-size: 24px;
      font-weight: bold;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: black;
      font-size: 14px;
    }

    .hero {
      text-align: center;
      padding: 120px 20px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      color: #555;
      max-width: 600px;
      margin: auto;
    }

    .hero button {
      margin-top: 40px;
      padding: 15px 30px;
      font-size: 16px;
      border: none;
      background-color: black;
      color: white;
      cursor: pointer;
      border-radius: 30px;
    }

    .section {
      padding: 80px 40px;
      text-align: center;
      background-color: #f7f7f7;
    }

    .section h3 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    footer {
      text-align: center;
      padding: 30px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>

<header>
  <h1>Techy-X</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Future. Powered by Tech.</h2>
  <p>
    Techy-X creates clean, powerful technology designed to make your life smarter, faster, and better.
  </p>
  <button>Explore Techy-X</button>
</section>

<section class="section">
  <h3>Designed for the Future</h3>
  <p>Minimal design. Maximum performance. Built with innovation at its core.</p>
</section>

<footer>
  © 2026 Techy-X. All rights reserved.
</footer>

</body>
</html>
